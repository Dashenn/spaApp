{% if messages %}
<div class="django-messages">
  {% for message in messages %}
    <div class="alert django-message django-message-{{ message.tags }} alert-dismissible fade show" role="alert">
      <div class="django-message-text">
        {{ message }}
      </div>

      <button
        type="button"
        class="btn-close"
        data-bs-dismiss="alert"
        aria-label="Закрыть"
      ></button>
    </div>
  {% endfor %}
</div>
{% endif %}
